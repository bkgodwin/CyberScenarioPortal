{% extends "base.html" %}

{% block title %}Login — Cyber Scenario Portal{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">🛡️</div>
      <h1 class="login-title">CyberScenario Portal</h1>
      <p class="login-subtitle">Security Training &amp; Simulation Platform</p>
    </div>

    <!-- Tab switcher -->
    <div class="login-tabs">
      <button class="tab-btn active" data-tab="student">
        🎓 Student Login
      </button>
      <button class="tab-btn" data-tab="teacher">
        👩‍🏫 Teacher Login
      </button>
    </div>

    <!-- Student tab -->
    <div class="tab-content active" id="tab-student">
      <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="login_type" value="student" />
        <div class="form-group">
          <label class="form-label" for="student-username">Username</label>
          <input
            class="form-control"
            type="text"
            id="student-username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />
          <small class="form-hint">New users are registered automatically.</small>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          Enter Portal →
        </button>
      </form>
    </div>

    <!-- Teacher tab -->
    <div class="tab-content" id="tab-teacher">
      <form method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="login_type" value="teacher" />
        <div class="form-group">
          <label class="form-label" for="teacher-username">Username</label>
          <input
            class="form-control"
            type="text"
            id="teacher-username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="teacher-password">Password</label>
          <input
            class="form-control"
            type="password"
            id="teacher-password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          Teacher Login →
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
